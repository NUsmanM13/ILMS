<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; }
        .option-card { border: 2px solid #f1f5f9; transition: all 0.2s; }
        .option-card:hover { border-color: #3b82f6; background-color: #f8faff; }
        input[type="radio"]:checked + .option-content { color: #3b82f6; }
        input[type="radio"]:checked ~ .option-card { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="py-12 px-6">
    <div class="max-w-3xl mx-auto">
        
        <!-- Top Info -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <span class="w-8 h-8 bg-slate-900 text-white rounded-lg flex items-center justify-center text-[10px] font-bold">{{ index }}</span>
                <h2 class="text-sm font-bold text-slate-500">{{ session.subject.name }}</h2>
            </div>
            <div class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">
                {{ session.get_exam_type_display }}
            </div>
        </div>

        <!-- Progress Bar (Fixed Style) -->
        <div class="w-full h-1.5 bg-slate-100 rounded-full mb-16 overflow-hidden">
            <div class="h-full bg-blue-600 transition-all duration-500" 
                 style="--progress: {% widthratio index 25 100 %}%; width: var(--progress);"></div>
        </div>

        <!-- Savol -->
        <div class="mb-12">
            <h1 class="text-3xl font-bold leading-tight tracking-tight text-slate-900">
                {{ question.text }}
            </h1>
        </div>

        <!-- Javoblar Formasi -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            {% for i in "1234" %}
            <label class="relative block cursor-pointer group">
                <input type="radio" name="option" value="{{ forloop.counter }}" class="absolute opacity-0" required>
                <div class="option-card p-6 rounded-[1.5rem] flex items-center gap-4">
                    <div class="w-6 h-6 rounded-full border-2 border-slate-200 flex items-center justify-center group-hover:border-blue-400 transition-colors">
                        <div class="w-2.5 h-2.5 bg-blue-600 rounded-full opacity-0 check-dot"></div>
                    </div>
                    <span class="text-lg font-medium text-slate-600 group-hover:text-slate-900 option-content">
                        {% if i == "1" %}{{ question.option1 }}
                        {% elif i == "2" %}{{ question.option2 }}
                        {% elif i == "3" %}{{ question.option3 }}
                        {% else %}{{ question.option4 }}{% endif %}
                    </span>
                </div>
            </label>
            {% endfor %}

            <div class="pt-10">
                <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-bold text-lg hover:bg-blue-600 transition-all shadow-xl shadow-slate-200 flex items-center justify-center gap-3">
                    Keyingi savol <i class="fas fa-chevron-right text-xs"></i>
                </button>
            </div>
        </form>

    </div>

    <style>
        input[type="radio"]:checked + div .check-dot { opacity: 1; }
        input[type="radio"]:checked + div { border-color: #3b82f6; background-color: #f0f7ff; }
    </style>
</body>
</html>
