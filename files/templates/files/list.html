<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fayllar - ILMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0d2c40; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-hover:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-5px); border-color: rgba(0, 123, 255, 0.4); }
        .nav-btn { background: rgba(0, 123, 255, 0.2); border: 1px solid rgba(0, 123, 255, 0.3); transition: all 0.3s; }
        .nav-btn:hover { background: rgba(0, 123, 255, 0.4); box-shadow: 0 0 20px rgba(0, 123, 255, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Navbar -->
    <nav class="max-w-6xl mx-auto glass rounded-2xl p-4 flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600/30 rounded-xl flex items-center justify-center border border-blue-500/50">
                <i class="fas fa-folder-tree text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">ILMS <span class="text-blue-400">Files</span></span>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm text-blue-200 hidden md:block">{{ user.username }}</span>
            <a href="/" class="nav-btn px-4 py-2 rounded-xl text-sm font-semibold">Bosh sahifa</a>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-3xl font-bold">Fayllar</h1>
                <p class="text-blue-200/60 text-sm mt-1"></p>
            </div>
            {% if user.is_staff %}
            <a href="/admin/files/folder/add/" class="nav-btn px-6 py-3 rounded-2xl text-sm font-bold shadow-lg">
                <i class="fas fa-plus mr-2"></i> Yangi mavzu
            </a>
            {% endif %}
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for folder in folders %}
            <a href="{% url 'files:detail' folder.pk %}" class="glass glass-hover rounded-[2rem] p-8 transition-all duration-300 relative overflow-hidden group">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-600/10 rounded-full blur-2xl group-hover:bg-blue-600/20 transition-all"></div>
                
                <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center mb-6 border border-blue-500/20">
                    <i class="fas fa-folder-open text-2xl text-blue-400"></i>
                </div>
                
                <h3 class="text-xl font-bold mb-2 group-hover:text-blue-400 transition-colors">{{ folder.name }}</h3>
                <p class="text-blue-100/50 text-sm line-clamp-2 leading-relaxed mb-6">{{ folder.description }}</p>
                
                <div class="flex items-center justify-between pt-4 border-t border-white/5">
                    <span class="text-[10px] font-bold text-blue-400/80 uppercase tracking-widest">
                        {{ folder.materials.count }} Material
                    </span>
                    <i class="fas fa-arrow-right text-xs text-blue-500"></i>
                </div>
            </a>
            {% empty %}
            <div class="col-span-full py-20 text-center glass rounded-3xl">
                <i class="fas fa-inbox text-4xl text-blue-500/20 mb-4"></i>
                <p class="text-blue-200/40">Hozircha kurslar qo'shilmagan</p>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
