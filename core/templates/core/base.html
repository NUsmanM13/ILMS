{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ILMS Platformasi{% endblock %}</title>

  <!-- AOS CSS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::after, *::before { margin:0; padding:0; box-sizing:border-box; }

    body{
      font-family:'Poppins',sans-serif;
      display:flex; flex-direction:column;
      align-items:center;
      min-height:100vh;
      background-color:#0d2c40;
      color:#333;
      padding:2rem;
      position:relative;
    }

    /* Orqa fon */
    #background-iframe{
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      z-index:0;
      border:none;
    }

    #particles-container{
      position:fixed;
      width:100%; height:100%;
      top:0; left:0;
      z-index:1;
    }

    /* Kontentlar yuqorida */
    .page-layer{ z-index:2; position:relative; width:100%; max-width:1200px; }

    /* NAVBAR */
    .nav-wrap{
      width:100%; margin: 0 auto 2rem auto; display:flex; justify-content:center;
    }

    .navbar{
      width:100%; max-width:1200px; display:flex; align-items:center; justify-content:space-between; gap:16px;
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px; padding:14px 16px;
      box-shadow: 0 8px 32px 0 rgba(0,0,0,.25);
    }

    .brand{ display:flex; align-items:center; gap:10px; color:#fff; text-decoration:none; font-weight:700; letter-spacing:.2px; white-space:nowrap; }
    .brand-badge{ width:38px; height:38px; border-radius:12px; display:grid; place-items:center; background: rgba(0,123,255,.20); border: 1px solid rgba(0,123,255,.30); color:#fff; box-shadow: 0 10px 20px rgba(0,0,0,.18); flex:0 0 auto; }
    .nav-links{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .nav-btn{ text-decoration:none; color:#fff; font-weight:600; font-size:.95rem; padding:10px 14px; border-radius:14px; background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.18); transition: transform .2s ease, background .2s ease, box-shadow .2s ease; display:inline-flex; align-items:center; gap:8px; white-space:nowrap; }
    .nav-btn:hover{ transform: translateY(-2px); background: rgba(255,255,255,.14); box-shadow: 0 12px 26px rgba(0,0,0,.22); }
    .nav-btn.primary{ background: rgba(0,123,255,.22); border: 1px solid rgba(0,123,255,.35); }
    .nav-user{ color:#a7dceb; font-size:.92rem; margin-right:6px; white-space:nowrap; }

    /* ASOSIY SAHIFA KARTALARI */
    .main-content{ text-align:center; margin-bottom:3rem; }
    .main-title{ font-size:3rem; color:#fff; font-weight:700; text-shadow:2px 2px 8px rgba(0,0,0,.5); margin-bottom:1rem; }
    .main-subtitle{ font-size:1.2rem; color:#a7dceb; max-width:600px; margin:0 auto; }
    
    .card-container{ display:flex; flex-wrap:wrap; justify-content:center; gap:2rem; max-width:1200px; }
    .card-link{ text-decoration:none; color:inherit; }
    .card{ background:rgba(255,255,255,.1); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.2); border-radius:15px; width:320px; padding:2.5rem 2rem; text-align:center; box-shadow:0 8px 32px 0 rgba(0,0,0,.37); transition:transform .3s ease, box-shadow .3s ease; }
    .card:hover{ transform:translateY(-15px); box-shadow:0 16px 40px 0 rgba(0,0,0,.5); }
    .card h2{ font-size:1.5rem; color:#fff; font-weight:600; }

    /* =========================================
       LOGIN VA REGISTER FORMALARI UCHUN DIZAYN
       ========================================= */
    .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 60vh; width: 100%; }
    .auth-card {
      background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
      width: 100%; max-width: 420px; padding: 3rem 2.5rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3); color: #fff; text-align: center;
    }
    .auth-card h2 { font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700; }
    .auth-card p.subtitle { color: #a7dceb; font-size: 0.95rem; margin-bottom: 2rem; }
    
    /* Django form elementlarini stili */
    .auth-card form { text-align: left; }
    .auth-card p { margin-bottom: 1.2rem; }
    .auth-card label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #e0f2f7; font-size: 0.9rem; }
    .auth-card input {
      width: 100%; padding: 12px 15px; background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
      color: #fff; font-family: 'Poppins', sans-serif; font-size: 1rem; outline: none;
      transition: all 0.3s ease;
    }
    .auth-card input:focus { border-color: #007bff; box-shadow: 0 0 12px rgba(0, 123, 255, 0.4); background: rgba(255, 255, 255, 0.1); }
    .auth-card input::placeholder { color: rgba(255,255,255,0.4); }
    
    .auth-card .helptext { font-size: 0.75rem; color: #8bbdd9; display: block; margin-top: 4px; }
    .auth-card ul.errorlist { color: #ff6b6b; list-style: none; font-size: 0.85rem; margin-bottom: 1rem; padding: 0; }
    
    .auth-btn {
      width: 100%; padding: 14px; margin-top: 1rem; background: #007bff; color: #fff;
      border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600;
      font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
    }
    .auth-btn:hover { background: #0056b3; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5); }
    .auth-card .bottom-link { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: #a7dceb; }
    .auth-card .bottom-link a { color: #fff; font-weight: 600; text-decoration: none; transition: color 0.2s; }
    .auth-card .bottom-link a:hover { color: #007bff; }

    /* CHATBOT TRIGGER BUTTON */
.chatbot-trigger {
    position: fixed;
    right: 30px;
    bottom: 30px;
    width: 65px;
    height: 65px;
    background: #007bff;
    border-radius: 22px;
    cursor: pointer;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(0, 123, 255, 0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.chatbot-trigger:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 15px 30px rgba(0, 123, 255, 0.5);
}

.chatbot-trigger img {
    width: 100%;
    height: 100%;
    border-radius: 22px;
    object-fit: cover;
}

.badge-online {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 15px;
    height: 15px;
    background: #28a745;
    border: 3px solid #fff;
    border-radius: 50%;
    z-index: 1001;
}

/* MAIN CONTAINER */
.chat-container {
    position: fixed;
    right: 30px;
    bottom: 110px;
    width: 380px;
    max-width: calc(100vw - 60px);
    height: 550px;
    max-height: calc(100vh - 150px);
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    display: none; /* JS orqali boshqariladi */
    flex-direction: column;
    z-index: 9999;
    overflow: hidden;
    animation: slideUp 0.4s ease;
    border: 1px solid rgba(0,0,0,0.05);
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* HEADER */
.chat-header {
    background: #007bff;
    padding: 20px 25px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.header-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.bot-avatar {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
}

.header-info h3 {
    font-size: 1rem;
    font-weight: 700;
    margin: 0;
}

.header-info span {
    font-size: 0.75rem;
    opacity: 0.9;
    display: flex;
    align-items: center;
    gap: 5px;
}

.online-dot {
    font-size: 6px;
    color: #28a745;
}

.close-chat {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.close-chat:hover { background: rgba(255,255,255,0.3); }

/* CHAT BODY */
.chat-body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #f8fafc;
    display: flex;
    flex-direction: column;
    gap: 15px;
    scrollbar-width: thin;
}

.message {
    padding: 12px 16px;
    border-radius: 18px;
    max-width: 85%;
    font-size: 0.92rem;
    line-height: 1.5;
    position: relative;
    animation: fadeInMsg 0.3s ease;
}

@keyframes fadeInMsg {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.bot-message {
    background: #fff;
    color: #334155;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border: 1px solid #e2e8f0;
}

.user-message {
    background: #007bff;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2);
}

/* FOOTER */
.chat-footer {
    padding: 15px 20px;
    background: #fff;
    border-top: 1px solid #f1f5f9;
}

.input-wrapper {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    padding: 5px 5px 5px 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.input-wrapper:focus-within {
    background: #fff;
    box-shadow: 0 0 0 2px rgba(0,123,255,0.1);
    border-color: #007bff;
}

#user-input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 0;
    outline: none;
    font-size: 0.9rem;
    color: #334155;
}

#send-button {
    width: 40px;
    height: 40px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

#send-button:hover {
    background: #0056b3;
    transform: scale(1.05);
}

/* MOBILE RESPONSIVE */
@media (max-width: 480px) {
    .chat-container {
        right: 15px;
        left: 15px;
        bottom: 90px;
        width: auto;
    }
}    

    @media (max-width:768px){
      body{ padding:1rem; }
      .main-title{ font-size:2.5rem; }
      .card{ width:100%; max-width:350px; }
      .auth-card{ padding: 2rem 1.5rem; }
      .chatbot{ width:60px; height:60px; right:20px; bottom:20px; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>

<body>
  <!-- Orqa fon 3D -->
  <iframe id="background-iframe" src="https://my.spline.design/roomgirlworkingcopy-0PczbcgyzcD3JirbE5n7t0VI/"></iframe>
  <div id="particles-container"></div>

  <!-- Navbar -->
  <div class="nav-wrap page-layer">
    {% include "core/partials/nav.html" %}
  </div>

  <!-- Asosiy Qism -->
  <div class="page-layer" style="width: 100%;">
    {% block content %}{% endblock %}
  </div>



  <!-- Chatbot Tugmasi -->
<div class="chatbot-trigger" id="openBtn">
    <div class="badge-online"></div>
    <img src="{% static 'core/image.webp' %}" alt="ChatBot">
</div>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Chatbot Oynasi -->
<div class="chat-container" id="chatbotWindow">
    <!-- Header -->
    <div class="chat-header">
        <div class="header-info">
            <div class="bot-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div>
                <h3>ILMS Assistant</h3>
                <span><i class="fas fa-circle online-dot"></i> Online</span>
            </div>
        </div>
        <button id="closeBtn" class="close-chat">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <!-- Chat Log -->
    <div id="chat-log" class="chat-body">
        <div class="message bot-message shadow-sm">
            Salom! 👋 ILMS platformasi bo'yicha qanday savollaringiz bor? Sizga yordam berishdan xursandman.
        </div>
    </div>

    <!-- Input Area -->
    <div class="chat-footer">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Xabar yozing..." autocomplete="off">
            <button id="send-button">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

  <!-- JS Kutubxonalar -->
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@1.34.1/dist/tsparticles.min.js"></script>

  <script>
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Animatsiyalarni yoqish
      AOS.init({ duration: 800, once: true });

      // Zarrachalar effektini yoqish
      if (window.tsParticles) {
        tsParticles.load("particles-container", {
          fpsLimit: 60,
          particles: {
            number: { value: 25, density: { enable: true, area: 800 } },
            shape: {
              type: "image",
              image: [
                { src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMS41IiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJpY29uIGljb24tdGFibGVyIGljb24tdGFibGVyLWJvb2stMiI+PHBhdGggc3Ryb2tlPSJub25lIiBkPSJNMCAwaDI0djI0SDB6IiBmaWxsPSJub25lIj48L3BhdGg+PHBhdGggZD0iTTE5IDQuNTVhMi43IDEuNDUgMCAwIDAtMi43IC0uNTUgMi43IDEuNDUgMCAwIDAtMi43IC41NSAuNjg0LjY4NCAwIDAgMC0uMzUgMS40NWg1Ljc4MWEuNjkuNiAwIDAgMC0uMzUtMS40NXoiIC8+PHBhdGggZD0iTTggNGEyLjQgMS4yIDAgMCAxIDAgMi40IDIuNCAxLjIgMCAwIDEgMC0yLjQyIiAvPjxwYXRoIGQ9Ik0xMiA2aDIgYSBMMjAgNnYxMEExIDEgMCAwIDEgMTkgMTcgSDVhMSAxIDAgMCAxLTEtMVY3YTIgMiAwIDAgMSA0IDBoMiIvPjwvc3ZnPg==" },
                { src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMS41IiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJpY29uIGljb24tdGFibGVyIGljb24tdGFibGVyLXBlbmNpbCI+PHBhdGggc3Ryb2tlPSJub25lIiBkPSJNMCAwaDI0djI0SDB6IiBmaWxsPSJub25lIj48L3BhdGg+PHBhdGggZD0iTTQgMjAuNDAzbDEwLjItMTAuMiAxLjQxNCAxLjQxNC0xMC4yIDEwLjJ6IiAvPjxwYXRoIGQ9Ik0xMy41IDYuNWwtMS40MTQgMS40MTQgMy43NTcgMy43NTcgMS40MTQtMS40MTRhMiAyIDAgMCAwIDAtMi44MjhsLS45MjktLjkyOWEyIDIgMCAwIDAtMi44MjggMHoiIC8+PC9zdmc+" }
              ]
            },
            size: { value: 30, random: { enable: true, minimumValue: 15 } },
            opacity: { value: 0.5, random: { enable: true, minimumValue: 0.1 }, animation: { enable: true, speed: 0.5, minimumValue: 0.1, sync: false } },
            move: { enable: true, speed: 1, direction: "none", random: true, straight: false, outModes: { default: "out" } }
          },
          interactivity: { detectsOn: "canvas", events: { resize: true } },
          detectRetina: true
        });
      }

      // Chatbot logikasi
      const chatLog = document.getElementById('chat-log');
      const userInput = document.getElementById('user-input');
      const sendButton = document.getElementById('send-button');
      const openBtn = document.getElementById('openBtn');
      const closeBtn = document.getElementById('closeBtn');
      const chatbotDiv = document.querySelector('.chatbot-div');

      function appendMessage(message, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
        messageDiv.textContent = message;
        chatLog.appendChild(messageDiv);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      async function sendMessage() {
        const messageText = userInput.value.trim();
        if (!messageText) return;

        appendMessage(messageText, 'user');
        userInput.value = '';
        userInput.focus();

        try {
          const response = await fetch("{% url 'core:chatbot_api' %}", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": getCookie("csrftoken"),
            },
            body: JSON.stringify({ message: messageText })
          });

          if (!response.ok) throw new Error("Server xatosi: " + response.status);
          const data = await response.json();
          appendMessage(data.reply || "Javob topilmadi.", 'bot');
        } catch (e) {
          console.error(e);
          appendMessage("Kechirasiz, server bilan bog'lanishda xatolik yuz berdi.", 'bot');
        }
      }

      sendButton.addEventListener('click', sendMessage);
      userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
      openBtn.addEventListener('click', () => { chatbotDiv.style.display = 'flex'; });
      closeBtn.addEventListener('click', () => { chatbotDiv.style.display = 'none'; });
      chatbotDiv.addEventListener('click', (e) => { if (e.target === chatbotDiv) chatbotDiv.style.display = 'none'; });
    });

    document.addEventListener('DOMContentLoaded', () => {
    const openBtn = document.getElementById('openBtn');
    const closeBtn = document.getElementById('closeBtn');
    const chatbotWindow = document.getElementById('chatbotWindow');

    // Botni ochish
    openBtn.addEventListener('click', () => {
        chatbotWindow.style.display = 'flex';
        // Xabarlar eng pastiga tushishi uchun
        const chatLog = document.getElementById('chat-log');
        chatLog.scrollTop = chatLog.scrollHeight;
    });

    // Botni yopish
    closeBtn.addEventListener('click', () => {
        chatbotWindow.style.display = 'none';
    });

    // Send logic (Sizning oldingi kodingizga o'xshash, faqat appendMessage ni biroz o'zgartiring)
    // appendMessage ichida sender === 'user' bo'lsa 'user-message' va 'shadow-sm' klassini qo'shing
});
  </script>
</body>
</html>
